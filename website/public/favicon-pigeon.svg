<!--
  Simplified pigeon silhouette for 16x16 readability.
  Single closed path, monochrome ink fill on paper background.
  Copper dot accent suggests the mechanical-gear motif of the full mascot.

  Refine in a design tool if you want a cleaner silhouette derived
  directly from etc/aimx-pigeon.svg. This is the placeholder.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <rect width="16" height="16" fill="#F4EEE3"/>
  <!-- Pigeon body: stylized side-profile silhouette -->
  <path d="M 2,9 C 2,7 3,5.5 5,5 L 7,4.5 C 8,4 9,4 10,4.5 L 11,5 L 13,4 L 13,5 L 11.5,5.5 L 12,6.5 C 12.5,7 13,8 12.5,9 L 11,10.5 L 11,12 L 10,12 L 10,11 L 6,11 L 6,12 L 5,12 L 5,10.5 C 3,10 2,10 2,9 Z"
        fill="#151310"/>
  <!-- Copper eye dot -->
  <circle cx="11" cy="6" r="0.6" fill="#B9531C"/>
</svg>
