<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph image template — 1200x630.

  Use as a starting point. Open in a design tool, drop the actual
  pigeon mascot from etc/aimx-pigeon.svg into the bordered placeholder
  on the right, tighten typography (Fraunces variable opsz 144 for the
  wordmark, IBM Plex Sans 40 for the tagline), then export PNG to
  website/public/og.png.

  Brand rules (docs/branding.md):
    paper  #F4EEE3 — background
    ink    #151310 — wordmark and tagline
    copper #B9531C — only the dot in "AIMX." and the top hairline.
                     Stays under ~3% of the canvas; never as a fill.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 630" width="1200" height="630" font-family="IBM Plex Sans, system-ui, sans-serif">

  <defs>
    <radialGradient id="g-tl" cx="15%" cy="0%" r="65%">
      <stop offset="0%" stop-color="#B9531C" stop-opacity="0.07"/>
      <stop offset="55%" stop-color="#B9531C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-br" cx="90%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#B9531C" stop-opacity="0.05"/>
      <stop offset="55%" stop-color="#B9531C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Paper background + subtle radials, mirroring homepage body -->
  <rect width="1200" height="630" fill="#F4EEE3"/>
  <rect width="1200" height="630" fill="url(#g-tl)"/>
  <rect width="1200" height="630" fill="url(#g-br)"/>

  <!-- Editorial hairline, top-left -->
  <line x1="80" y1="100" x2="160" y2="100" stroke="#B9531C" stroke-width="1.5"/>

  <!-- Wordmark — replace with actual Fraunces glyph paths in design tool -->
  <text x="80" y="350" font-family="Fraunces, Georgia, serif" font-size="200" font-weight="500" fill="#151310" letter-spacing="-4px">AIMX<tspan fill="#B9531C">.</tspan></text>

  <!-- Tagline -->
  <text x="84" y="430" font-size="44" font-weight="400" fill="#2B2620">SMTP for AI agents. No middleman.</text>

  <!-- URL, bottom-left, monospace -->
  <text x="84" y="560" font-family="IBM Plex Mono, monospace" font-size="26" font-weight="400" fill="#5C5549" letter-spacing="0.5">aimx.email</text>

  <!-- Pigeon mascot placeholder — drop etc/aimx-pigeon.svg paths here in your design tool.
       The mascot SVG is 1567x1567; scale ~0.18 (or set width="280") and translate to fit. -->
  <g transform="translate(800, 90)">
    <rect width="320" height="320" fill="none" stroke="#D8CFBE" stroke-width="1.5" stroke-dasharray="6 6"/>
    <text x="40" y="170" font-family="IBM Plex Mono, monospace" font-size="20" fill="#5C5549">paste etc/aimx-pigeon.svg</text>
    <text x="40" y="195" font-family="IBM Plex Mono, monospace" font-size="20" fill="#5C5549">contents here</text>
  </g>

</svg>
