[[hook_template]]
name = "webhook"
description = "POST the email as JSON to a URL"
cmd = [
    "/usr/bin/curl",
    "-sS",
    "-X",
    "POST",
    "-H",
    "Content-Type: application/json",
    "--data-binary",
    "@-",
    "{url}",
]
params = ["url"]
stdin = "email_json"
run_as = "aimx-hook"
timeout_secs = 60
allowed_events = ["on_receive", "after_send"]
