name: CI

on:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so `build.rs`' `git describe --tags --always
          # --dirty` can reach the most recent release tag and emit a bare
          # SemVer `RELEASE_TAG`. With the default shallow/no-tags checkout,
          # describe falls back to a raw short hash and
          # `aimx_version_renders_full_metadata` fails.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check author metadata
        run: |
          if grep -r '"author"' agents/ | grep -q '"AIMX"'; then
            echo "ERROR: Found placeholder author string 'AIMX' under agents/"
            grep -rn '"author"' agents/ | grep '"AIMX"'
            exit 1
          fi
          if grep -r 'chua@example.com' agents/; then
            echo "ERROR: Found placeholder email under agents/"
            exit 1
          fi
          echo "Author metadata check passed"

  mailbox-dir-perms-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Provision test users
        run: |
          sudo useradd --system --no-create-home --shell /usr/sbin/nologin aimx-test-alice || \
            id aimx-test-alice
          sudo useradd --system --no-create-home --shell /usr/sbin/nologin aimx-test-bob || \
            id aimx-test-bob

      - name: Build the isolation test binaries
        run: |
          cargo test --no-run --test mailbox_isolation
          cargo test --no-run --test uds_authz

      - name: Run mailbox isolation test (under sudo)
        run: |
          # Pre-built binary path is stable thanks to `--no-run`; locate
          # the most-recently-built `mailbox_isolation-*` artifact and
          # run it as root with the sudo gate set so the test body
          # actually exercises the kernel-level isolation. Skipping
          # `cargo test` here avoids re-running rustc under sudo with a
          # cargo home pointing at root's $HOME.
          BIN=$(ls -t target/debug/deps/mailbox_isolation-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --ignored

      - name: Run UDS authz tests (under sudo)
        run: |
          # Same shape as the mailbox-isolation step. The uds_authz
          # tests spin up a real `aimx serve` subprocess under a
          # tempdir, then poke each verb as alice / bob / root over
          # the unix socket. Authz rejections must surface as
          # `EACCES` on the wire; root must always pass.
          BIN=$(ls -t target/debug/deps/uds_authz-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --ignored --test-threads=1

      - name: Tear down test users
        if: always()
        run: |
          sudo userdel aimx-test-alice || true
          sudo userdel aimx-test-bob || true

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdbook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.4.40'

      - name: Build mdbook
        run: mdbook build website

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Lint docs against `aimx --help`
        run: ./scripts/check-docs.sh

  verifier-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/verifier
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/verifier

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

