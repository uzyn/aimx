name: CI

on:
  push:

env:
  CARGO_TERM_COLOR: always

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      # Sprint 2 S2-3: Tier-2 integration tests that hit the live
      # `0.0.0-fixture` GitHub release (bare SemVer post-Sprint 8.0.1).
      # Feature-gated so the default `cargo test` above stays offline
      # and free of rate-limit flakes.
      - name: Run release integration tests
        run: cargo test --features integration --test release_integration

      - name: Check author metadata
        run: |
          if grep -r '"author"' agents/ | grep -q '"AIMX"'; then
            echo "ERROR: Found placeholder author string 'AIMX' under agents/"
            grep -rn '"author"' agents/ | grep '"AIMX"'
            exit 1
          fi
          if grep -r 'chua@example.com' agents/; then
            echo "ERROR: Found placeholder email under agents/"
            exit 1
          fi
          echo "Author metadata check passed"

  integration-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Sprint 2 S2-4: root-gated per-mailbox isolation test. Creates
      # `aimx-it-alice` and `aimx-it-bob` via `useradd`, delivers an
      # email to alice, asserts bob gets EACCES on alice's inbox. The
      # test is `#[ignore]` and also guarded by AIMX_INTEGRATION_SUDO=1
      # so a `cargo test` from a casual contributor does not try to
      # create system users.
      #
      # `sudo` on Ubuntu runners clears PATH via `secure_path`, which
      # drops `$HOME/.cargo/bin` and makes `cargo` / `rustc` unresolvable
      # inside the sudo environment. Propagate the full PATH via `env
      # PATH=$PATH` so both `cargo` and the `rustc -vV` probe cargo runs
      # internally can be resolved. Without this, the step exits 127 on
      # step invocation (cargo missing) or 101 (rustc missing, reported
      # by cargo itself), and the test body never runs.
      - name: Run isolation integration test (root)
        run: |
          sudo -E env "PATH=$PATH" AIMX_INTEGRATION_SUDO=1 cargo test --test isolation -- --ignored

      # Sprint 4 S4-4: root-gated UDS authz integration test. Reuses
      # the `aimx-it-alice` / `aimx-it-bob` fixture from Sprint 2 and
      # asserts that bob cannot SEND/MARK-READ/HOOK-CREATE as alice
      # over the UDS. Same runtime gating (AIMX_INTEGRATION_SUDO=1 +
      # sudo + PATH propagation) as the isolation test above.
      - name: Run UDS authz integration test (root)
        run: |
          sudo -E env "PATH=$PATH" AIMX_INTEGRATION_SUDO=1 cargo test --test uds_authz -- --ignored

      # Sprint 4 review NB-1: the five MAILBOX-CRUD UDS integration
      # tests in `tests/integration.rs` are `#[ignore]`-gated because
      # `MAILBOX-CREATE` / `MAILBOX-DELETE` are root-only (PRD §6.5)
      # and the daemon chowns freshly-created mailbox dirs to the
      # configured owner — a non-root `cargo test` cannot exercise the
      # code path. This step runs them explicitly under sudo, one name
      # per `--exact`, so any future skip regresses here rather than
      # silently.
      - name: Run MAILBOX-CRUD integration tests (root)
        run: |
          sudo -E env "PATH=$PATH" AIMX_INTEGRATION_SUDO=1 cargo test --test integration -- --ignored --exact \
            mailbox_create_via_uds_hotswaps_config_and_routes_new_mail \
            mailbox_delete_via_uds_refuses_nonempty_and_succeeds_after_cleanup \
            mailbox_delete_force_yes_wipes_contents_and_succeeds \
            mailbox_delete_force_without_yes_prompts_and_aborts_on_n \
            concurrent_mailbox_create_and_ingest_does_not_deadlock

      # Sprint 4 review NB-1: drives `RealReleaseOps::fetch_asset`
      # end-to-end against the live `0.0.0-fixture` release (bare
      # SemVer post-Sprint 8.0.1). The non-root test in
      # `tests/release_integration.rs` only asserts the root-check
      # refusal; this sudo-gated step is what actually exercises the
      # rustls + HTTPS production path in CI so a regression in
      # `fetch_asset` or the rustls-provider install surfaces here.
      - name: Run release end-to-end integration test (root)
        run: |
          sudo -E env "PATH=$PATH" AIMX_INTEGRATION_SUDO=1 \
            cargo test --features integration --test release_integration -- \
            --ignored --exact \
            real_release_ops_end_to_end_against_fixture_as_root

      # Sprint 8 S8-4: end-to-end agent flow test. Creates a real
      # system user, runs `aimx setup`-style config + DKIM keys, then
      # `aimx agent-setup claude-code` with a fake `claude` binary,
      # ingests a trusted `.eml`, and asserts the hook fired under the
      # matching uid via a sentinel file. Finishes with
      # `aimx agent-cleanup --full` and asserts the plugin files +
      # template are gone.
      - name: Run agent-flow end-to-end test (root)
        run: |
          sudo -E env "PATH=$PATH" AIMX_INTEGRATION_SUDO=1 cargo test --test e2e_agent_flow -- --ignored

  # Onboarding Sprint 3 (S3-3): lint + exercise `install.sh` under dash
  # (debian:stable-slim) and busybox sh (alpine:latest). The happy-path
  # runs fetch the real `0.0.0-fixture` GitHub Release (bare SemVer
  # post-Sprint 8.0.1) — that tag is permanent per Sprint 1.3 tag
  # discipline, carries all four target tarballs, and exercises the
  # exact curl-to-shell flow operators hit.
  #
  # No checksum-verification test path here: `install.sh` v1 does not
  # verify SHA-256 (PRD FR-2.4 — trust anchor is HTTPS). Skeptical
  # operators verify manually via the release-notes `sha256sum -c`
  # block (FR-1.4).
  install-sh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck install.sh
        run: shellcheck install.sh

      - name: POSIX parse via dash
        run: dash -n install.sh

      - name: POSIX parse via busybox sh
        run: |
          # busybox sh -n on the host if available; fall back to Docker.
          if command -v busybox >/dev/null; then
            busybox sh -n install.sh
          else
            docker run --rm -v "${PWD}:/src" -w /src busybox:stable sh -n install.sh
          fi

      - name: Help flag under dash
        run: dash install.sh --help

      - name: Dry-run under dash (fixture release, x86_64 gnu)
        env:
          AIMX_DRY_RUN: '1'
        run: |
          dash install.sh --tag 0.0.0-fixture \
            --target x86_64-unknown-linux-gnu --to /tmp/aimx-dry

      - name: Dry-run under dash (fixture release, aarch64 musl target override)
        env:
          AIMX_DRY_RUN: '1'
        run: |
          dash install.sh --tag 0.0.0-fixture \
            --target aarch64-unknown-linux-musl --to /tmp/aimx-dry

      - name: Fresh install under alpine:latest (busybox sh)
        run: |
          docker run --rm -v "${PWD}:/src" -w /src alpine:latest sh -eu -c '
            apk add --no-cache curl tar >/dev/null
            mkdir -p /tmp/aimx-alpine
            # alpine is musl; let detection resolve target triple.
            sh install.sh --tag 0.0.0-fixture --to /tmp/aimx-alpine
            test -x /tmp/aimx-alpine/aimx
            /tmp/aimx-alpine/aimx --version
          '

      - name: Fresh install under debian:stable-slim (dash as sh)
        run: |
          docker run --rm -v "${PWD}:/src" -w /src debian:stable-slim sh -eu -c '
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends curl ca-certificates tar dash >/dev/null
            mkdir -p /tmp/aimx-deb
            # Run explicitly under dash for POSIX purity.
            dash install.sh --tag 0.0.0-fixture \
              --target x86_64-unknown-linux-gnu --to /tmp/aimx-deb
            test -x /tmp/aimx-deb/aimx
            /tmp/aimx-deb/aimx --version
          '

      - name: Unsupported-platform refusal is clean
        run: |
          # Force an unsupported target triple; install.sh must err
          # before any download and exit non-zero.
          if dash install.sh --target x86_64-unknown-linux-nosuch; then
            echo "expected failure on unsupported target" >&2
            exit 1
          fi

      - name: Same-version re-install refused without --force, accepted with --force
        run: |
          docker run --rm -v "${PWD}:/src" -w /src debian:stable-slim sh -eu -c '
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends curl ca-certificates tar dash >/dev/null
            mkdir -p /tmp/aimx-same
            # Lay down a stub aimx that self-reports the fixture tag, so the
            # same-version short-circuit in install.sh fires without relying
            # on the fixture tarballs self-reporting (they predate Sprint 2
            # build.rs metadata). Use printf (not HEREDOC) so YAML indentation
            # does not leak into the file.
            printf "%s\n" "#!/bin/sh" "echo \"aimx 0.0.0-fixture (stubshad) x86_64-unknown-linux-gnu built 2026-04-23\"" > /tmp/aimx-same/aimx
            chmod 0755 /tmp/aimx-same/aimx
            _before="$(stat -c %Y /tmp/aimx-same/aimx)"
            sleep 1
            # Without --force: installed == target short-circuits. Exit 0,
            # log "already installed", binary untouched.
            if ! dash install.sh --tag 0.0.0-fixture \
                --target x86_64-unknown-linux-gnu --to /tmp/aimx-same >/tmp/same.log 2>&1; then
              cat /tmp/same.log
              echo "expected same-version no-force install to exit 0" >&2
              exit 1
            fi
            cat /tmp/same.log
            grep -q "already installed" /tmp/same.log
            _after="$(stat -c %Y /tmp/aimx-same/aimx)"
            if [ "${_before}" != "${_after}" ]; then
              echo "same-version re-install should not rewrite binary without --force" >&2
              exit 1
            fi
            # With --force: install.sh proceeds through the upgrade path and
            # swaps the stub for the real fixture binary. mtime must change.
            sleep 1
            if ! dash install.sh --tag 0.0.0-fixture --force \
                --target x86_64-unknown-linux-gnu --to /tmp/aimx-same >/tmp/same-force.log 2>&1; then
              cat /tmp/same-force.log
              echo "expected same-version --force install to exit 0" >&2
              exit 1
            fi
            cat /tmp/same-force.log
            _forced="$(stat -c %Y /tmp/aimx-same/aimx)"
            if [ "${_after}" = "${_forced}" ]; then
              echo "--force same-version re-install should rewrite binary" >&2
              exit 1
            fi
          '

      - name: Downgrade refusal points at aimx upgrade --force
        run: |
          docker run --rm -v "${PWD}:/src" -w /src debian:stable-slim sh -eu -c '
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends curl ca-certificates tar dash >/dev/null
            mkdir -p /tmp/aimx-down
            # Lay down a fake "newer" aimx (reports a tag newer than the fixture).
            # Use printf (not HEREDOC) so YAML indentation does not leak into
            # the file or stop the HEREDOC terminator from matching at column 0.
            printf "%s\n" "#!/bin/sh" "echo \"aimx 9.9.9 (deadbeef)\"" > /tmp/aimx-down/aimx
            chmod 0755 /tmp/aimx-down/aimx
            # install.sh must refuse to overwrite with the older fixture tag,
            # even under --force, and emit the "aimx upgrade ... --force" hint.
            if dash install.sh --tag 0.0.0-fixture --force \
                --target x86_64-unknown-linux-gnu --to /tmp/aimx-down >/tmp/down.log 2>&1; then
              cat /tmp/down.log
              echo "expected downgrade refusal to exit non-zero" >&2
              exit 1
            fi
            cat /tmp/down.log
            grep -q "aimx upgrade --version" /tmp/down.log
            grep -q -- "--force" /tmp/down.log
          '

  # Onboarding Sprint 7 (S7-3 / FR-7.4): enforce that every user-facing styled
  # string lands via a helper in `src/term.rs`. Raw `.red()/.green()/.yellow()/
  # .blue()/.bold()` calls outside `term.rs` bypass the palette audit and cause
  # the CLI vocabulary to drift. The ASCII fallback literals `[OK]/[FAIL]/
  # [WARN]/[>]` must also only come from `term.rs` so the fallback surface
  # stays in one place.
  cli-colors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbid raw color methods outside term.rs
        run: |
          set +e
          matches="$(grep -rnE '\.(red|green|yellow|blue|bold)\(\)' src/ | grep -v 'src/term.rs')"
          if [ -n "$matches" ]; then
            echo "ERROR: raw .red()/.green()/.yellow()/.blue()/.bold() calls are not allowed outside src/term.rs."
            echo "Route styled output through helpers in src/term.rs instead (FR-7.4)."
            echo "$matches"
            exit 1
          fi

      - name: Forbid non-tty fallback literals outside term.rs
        run: |
          set +e
          matches="$(grep -rnE '\[OK\]|\[FAIL\]|\[WARN\]|\[>\]' src/ | grep -v 'src/term.rs')"
          if [ -n "$matches" ]; then
            echo "ERROR: the [OK]/[FAIL]/[WARN]/[>] fallback literals must only come from term.rs helpers."
            echo "Use term::success_mark()/fail_mark()/warn_mark()/prompt_mark() instead (FR-7.5)."
            echo "$matches"
            exit 1
          fi

  # Onboarding Sprint 8 (S8 review NB-1): build the mdBook docs so CI
  # catches markdown-syntax drift on every PR. The book sources live
  # under `book/`; `book.toml` sits in `website/` (with `src = "../book"`)
  # so we invoke `mdbook build` against the website/ directory — same
  # command the `website/Makefile` uses.
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.4.40'

      - name: Build mdbook
        run: mdbook build website

      # Onboarding Sprint 8 (S8 review NB-2): lightweight shell-level
      # doc lint. Parses `cargo run -- --help` subcommand names and
      # fails if `book/` references an `aimx <word>` verb that does not
      # exist in the CLI. Would have caught the `aimx config trust add`
      # drift that reviewed on PR #141.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Lint docs against `aimx --help`
        run: ./scripts/check-docs.sh

  verifier-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/verifier
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/verifier

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

