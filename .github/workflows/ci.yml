name: CI

on:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so `build.rs`' `git describe --tags --always
          # --dirty` can reach the most recent release tag and emit a bare
          # SemVer `RELEASE_TAG`. With the default shallow/no-tags checkout,
          # describe falls back to a raw short hash and
          # `aimx_version_renders_full_metadata` fails.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check author metadata
        run: |
          if grep -r '"author"' agents/ | grep -q '"AIMX"'; then
            echo "ERROR: Found placeholder author string 'AIMX' under agents/"
            grep -rn '"author"' agents/ | grep '"AIMX"'
            exit 1
          fi
          if grep -r 'chua@example.com' agents/; then
            echo "ERROR: Found placeholder email under agents/"
            exit 1
          fi
          echo "Author metadata check passed"

      # Storage-path enforcement: every NEW mailbox storage path must
      # go through `crate::storage::mailbox_storage_path` (or
      # `storage_path_for` in the same module). The grep below catches
      # raw concatenation of `/inbox/` and `/sent/` outside the
      # storage-helper module, the upgrade-migration module (which owns
      # the rename(2) of the legacy roots, by design), and the
      # discover-mailbox-names path (which walks `storage_roots()` and
      # then joins `inbox/`).
      #
      # Test fixtures that build directories under tempdirs to simulate
      # the on-disk layout are allowed: the `#[cfg(test)]` modules in
      # `src/` are scoped by file (so `src/storage.rs`'s tests pass
      # because the file is exempt) and `tests/` integration tests are
      # exempt entirely. Production code outside the allowed surface
      # surfaces here as a hard failure so the helper stays the single
      # source of truth.
      - name: Check storage path enforcement
        run: |
          set -euo pipefail
          # Limit to production source (exclude in-file test modules
          # via grep's line-level test). We run rust's macro-expansion
          # text against a simple `#[cfg(test)]`-aware filter by piping
          # through awk: any line inside a `#[cfg(test)]` mod gets
          # marked, and the final filter drops marked hits. Test
          # fixtures in tests/ are exempt entirely.
          HITS=$(awk '
            FNR == 1 { in_test = 0 }
            /^[[:space:]]*#\[cfg\(test\)\]/ { in_test = 1 }
            /^[[:space:]]*#\[cfg\(all\(test/ { in_test = 1 }
            in_test == 1 { next }
            /\.join\("(inbox|sent)"\)/ { print FILENAME ":" FNR ": " $0 }
          ' \
            src/storage.rs src/upgrade_migration.rs src/mailbox.rs \
            src/mailbox_list_handler.rs src/mailbox_handler.rs \
            src/send_handler.rs src/ingest.rs src/state_handler.rs \
            src/mcp.rs src/hook_handler.rs src/hooks.rs src/serve.rs \
            src/setup.rs 2>/dev/null \
            | grep -vE 'src/(storage|upgrade_migration|mailbox)\.rs' || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: raw .join(\"inbox\"|\"sent\") found in production code outside the storage helper."
            echo "Use crate::storage::mailbox_storage_path or storage_path_for instead."
            echo "Allowed exemptions: src/storage.rs (the helper itself),"
            echo "src/upgrade_migration.rs (owns the rename(2) of legacy roots),"
            echo "src/mailbox.rs (discover_mailbox_names walks storage_roots() + inbox/)."
            echo
            echo "$HITS"
            exit 1
          fi
          echo "Storage path enforcement check passed"

  mailbox-dir-perms-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Provision test users
        run: |
          sudo useradd --system --no-create-home --shell /usr/sbin/nologin aimx-test-alice || \
            id aimx-test-alice
          sudo useradd --system --no-create-home --shell /usr/sbin/nologin aimx-test-bob || \
            id aimx-test-bob

      - name: Build the isolation test binaries
        run: |
          cargo test --no-run --test mailbox_isolation
          cargo test --no-run --test uds_authz
          cargo test --no-run --test hooks_list_filter
          cargo test --no-run --test integration
          cargo test --no-run --test domains_uds
          cargo test --no-run --test domains_remove

      - name: Run mailbox isolation test (under sudo)
        run: |
          # Pre-built binary path is stable thanks to `--no-run`; locate
          # the most-recently-built `mailbox_isolation-*` artifact and
          # run it as root with the sudo gate set so the test body
          # actually exercises the kernel-level isolation. Skipping
          # `cargo test` here avoids re-running rustc under sudo with a
          # cargo home pointing at root's $HOME.
          BIN=$(ls -t target/debug/deps/mailbox_isolation-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --ignored

      - name: Run UDS authz tests (under sudo)
        run: |
          # Same shape as the mailbox-isolation step. The uds_authz
          # tests spin up a real `aimx serve` subprocess under a
          # tempdir, then poke each verb as alice / bob / root over
          # the unix socket. Authz rejections must surface as
          # `EACCES` on the wire; root must always pass.
          BIN=$(ls -t target/debug/deps/uds_authz-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --ignored --test-threads=1

      - name: Run hooks-list filter test (under sudo)
        run: |
          # Pins the wire-level behaviour of `aimx hooks list` filtering
          # output by caller euid. Spawns the CLI as alice / bob / root
          # against a temp config that carries one hook per user; asserts
          # each non-root caller sees only their own hook and root sees
          # both. Reuses the alice/bob test users provisioned above.
          BIN=$(ls -t target/debug/deps/hooks_list_filter-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --ignored

      - name: Run end-to-end production-perm MCP smoke (under sudo)
        run: |
          # Exercises every MCP tool against a `chmod 0600 root:root`
          # config + running `aimx serve`, with the MCP process spawned
          # under `runuser -u aimx-test-alice` so the bug class
          # ("non-root MCP cannot read root-owned config") is in scope.
          # Three tests in `tests/integration.rs` collectively cover all
          # 12 MCP tools.
          BIN=$(ls -t target/debug/deps/integration-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --ignored --test-threads=1 \
            mailbox_list_full_cycle_against_root_owned_config \
            email_list_full_cycle_against_root_owned_config \
            hook_list_full_cycle_against_root_owned_config

      - name: Run domains UDS hot-reload tests (under sudo)
        run: |
          # `tests/domains_uds.rs` covers `DOMAIN-CRUD` over UDS:
          # the daemon `DOMAIN-ADD` verb, hot-reload of in-memory
          # `Arc<Config>` + per-domain DKIM map, SMTP RCPT acceptance
          # for the freshly-added domain without a restart, duplicate-
          # add rejection, and the root daemon-stopped fallback.
          # These tests gate on `skip_if_not_root()` rather than
          # `#[ignore]`, so we run them as root WITHOUT `--ignored`;
          # the non-root subset (DKIM keygen path coverage) re-runs
          # harmlessly. `--test-threads=1` avoids contention on the
          # shared `AIMX_CONFIG_DIR` / UDS socket directory.
          BIN=$(ls -t target/debug/deps/domains_uds-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --test-threads=1

      - name: Run domains-remove cascade tests (under sudo)
        run: |
          # `tests/domains_remove.rs` covers `DOMAIN-REMOVE` over UDS:
          # clean remove, blocked-by-mailboxes refusal, last-domain
          # hard-block, --force cascade (mailbox wipe + per-domain
          # storage rmdir + config rewrite + DKIM map hot-swap with
          # the keypair preserved on disk), concurrent-ingest stress
          # against the surviving domain, and the daemon-stopped
          # fallback for root. Same skip_if_not_root() gate as
          # domains_uds — run without --ignored under sudo, single
          # thread to avoid socket contention.
          BIN=$(ls -t target/debug/deps/domains_remove-* | grep -v '\.d$' | head -n 1)
          test -x "$BIN"
          sudo AIMX_INTEGRATION_SUDO=1 "$BIN" --test-threads=1

      - name: Tear down test users
        if: always()
        run: |
          sudo userdel aimx-test-alice || true
          sudo userdel aimx-test-bob || true

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdbook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.5.2'

      - name: Install mdbook-mermaid
        run: |
          MERMAID_VERSION=0.17.0
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build mdbook
        run: mdbook build website

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Lint docs against `aimx --help`
        run: ./scripts/check-docs.sh

  verifier-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/verifier
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/verifier

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

