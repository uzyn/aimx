name: CI

on:
  push:

env:
  CARGO_TERM_COLOR: always

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check author metadata
        run: |
          if grep -r '"author"' agents/ | grep -q '"AIMX"'; then
            echo "ERROR: Found placeholder author string 'AIMX' under agents/"
            grep -rn '"author"' agents/ | grep '"AIMX"'
            exit 1
          fi
          if grep -r 'chua@example.com' agents/; then
            echo "ERROR: Found placeholder email under agents/"
            exit 1
          fi
          echo "Author metadata check passed"

  integration-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Sprint 2 S2-4: root-gated per-mailbox isolation test. Creates
      # `aimx-it-alice` and `aimx-it-bob` via `useradd`, delivers an
      # email to alice, asserts bob gets EACCES on alice's inbox. The
      # test is `#[ignore]` and also guarded by AIMX_INTEGRATION_SUDO=1
      # so a `cargo test` from a casual contributor does not try to
      # create system users.
      #
      # `sudo` on Ubuntu runners clears PATH via `secure_path`, which
      # drops `$HOME/.cargo/bin` and makes `cargo` / `rustc` unresolvable
      # inside the sudo environment. Propagate the full PATH via `env
      # PATH=$PATH` so both `cargo` and the `rustc -vV` probe cargo runs
      # internally can be resolved. Without this, the step exits 127 on
      # step invocation (cargo missing) or 101 (rustc missing, reported
      # by cargo itself), and the test body never runs.
      - name: Run isolation integration test (root)
        run: |
          sudo -E env "PATH=$PATH" AIMX_INTEGRATION_SUDO=1 cargo test --test isolation -- --ignored

      # Sprint 4 S4-4: root-gated UDS authz integration test. Reuses
      # the `aimx-it-alice` / `aimx-it-bob` fixture from Sprint 2 and
      # asserts that bob cannot SEND/MARK-READ/HOOK-CREATE as alice
      # over the UDS. Same runtime gating (AIMX_INTEGRATION_SUDO=1 +
      # sudo + PATH propagation) as the isolation test above.
      - name: Run UDS authz integration test (root)
        run: |
          sudo -E env "PATH=$PATH" AIMX_INTEGRATION_SUDO=1 cargo test --test uds_authz -- --ignored

  verifier-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/verifier
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/verifier

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

