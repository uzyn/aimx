name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      # Third-party actions are pinned by full commit SHA for supply-chain
      # safety; the trailing comment names the human-readable version so
      # `dependabot`/`renovate` (and humans) can bump them in lockstep.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve version string
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          # Tags are bare SemVer, but be lenient about a caller-supplied
          # `v` prefix in case a legacy tag ever reappears.
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2025-09-27
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: release-${{ matrix.target }}

      # Use `taiki-e/install-action` to pull a prebuilt `cross` binary
      # into `~/.cargo/bin` instead of recompiling it from source on
      # every matrix shard (saved ~1–2 min per leg).
      - uses: taiki-e/install-action@787505cde8a44ea468a00478fe52baf23b15bccd # v2.75.21
        with:
          tool: cross@0.2.5

      - name: Build release binary
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Stage tarball contents
        run: |
          set -euo pipefail
          # Artifact name drops the `-unknown-` vendor field
          # (Helix-style readability). The canonical target triple
          # (`x86_64-unknown-linux-gnu`) is still used for `cargo build
          # --target`, `aimx --version`, and the `TARGET` build-time env —
          # only the artifact filename is shortened.
          artifact_target="${{ matrix.target }}"
          artifact_target="${artifact_target/-unknown-/-}"
          stage="aimx-${{ steps.version.outputs.version }}-${artifact_target}"
          mkdir -p "${stage}"
          cp "target/${{ matrix.target }}/release/aimx" "${stage}/aimx"
          chmod 0755 "${stage}/aimx"
          cp LICENSE "${stage}/LICENSE"
          cp README.md "${stage}/README.md"
          cp -R book "${stage}/book"
          mkdir -p "${stage}/hook-templates"
          cp hook-templates/defaults.toml "${stage}/hook-templates/defaults.toml"
          echo "stage=${stage}" >> "$GITHUB_ENV"
          echo "artifact_target=${artifact_target}" >> "$GITHUB_ENV"

      - name: Create tarball and per-asset SHA-256
        run: |
          set -euo pipefail
          tarball="${stage}.tar.gz"
          # Deterministic-ish tar: fixed owner/group and mtime from the commit.
          # The GNU tar on ubuntu-latest supports these flags.
          mtime="$(git log -1 --format=%cI "${GITHUB_REF_NAME}")"
          tar \
            --sort=name \
            --owner=0 --group=0 --numeric-owner \
            --mtime="${mtime}" \
            -czf "${tarball}" "${stage}"
          sha256sum "${tarball}" > "${tarball}.sha256"
          echo "tarball=${tarball}" >> "$GITHUB_ENV"

      - name: Upload artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aimx-${{ matrix.target }}
          path: |
            ${{ env.tarball }}
            ${{ env.tarball }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve version string
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          date="$(date -u +%Y-%m-%d)"
          echo "date=${date}" >> "$GITHUB_OUTPUT"

      - name: Download build artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: aimx-*
          merge-multiple: true

      - name: Aggregate SHA256SUMS
        id: sums
        run: |
          set -euo pipefail
          cd dist
          # Normalise per-asset .sha256 files (strip any path prefix left by
          # matrix stages) and assemble the release-wide SHA256SUMS file.
          # Artifact names here are the shortened form
          # (no `-unknown-` vendor field).
          : > SHA256SUMS
          for t in aimx-*.tar.gz; do
            digest="$(sha256sum "${t}" | awk '{print $1}')"
            printf '%s  %s\n' "${digest}" "${t}" >> SHA256SUMS
            printf '%s  %s\n' "${digest}" "${t}" > "${t}.sha256"
          done
          sort -o SHA256SUMS SHA256SUMS
          # Expose each target digest for the release-notes template. The
          # `sha_<triple>` output key still uses the canonical target triple
          # (stable contract for the body-template step); the composed
          # tarball filename drops `-unknown-` for the on-disk lookup.
          {
            for target in \
              x86_64-unknown-linux-gnu \
              aarch64-unknown-linux-gnu \
              x86_64-unknown-linux-musl \
              aarch64-unknown-linux-musl
            do
              artifact_target="${target/-unknown-/-}"
              tarball="aimx-${{ steps.version.outputs.version }}-${artifact_target}.tar.gz"
              if [ -f "${tarball}" ]; then
                digest="$(sha256sum "${tarball}" | awk '{print $1}')"
                echo "sha_${target}=${digest}"
              fi
            done
          } >> "$GITHUB_OUTPUT"
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Build release notes body
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          DATE: ${{ steps.version.outputs.date }}
          # Output names include hyphens (the target triples), so use
          # bracket notation — dot notation on hyphenated identifiers is
          # ambiguous in the expression language (could tokenize as
          # subtraction) even though it happens to work today.
          SHA_X86_GNU: ${{ steps.sums.outputs['sha_x86_64-unknown-linux-gnu'] }}
          SHA_ARM_GNU: ${{ steps.sums.outputs['sha_aarch64-unknown-linux-gnu'] }}
          SHA_X86_MUSL: ${{ steps.sums.outputs['sha_x86_64-unknown-linux-musl'] }}
          SHA_ARM_MUSL: ${{ steps.sums.outputs['sha_aarch64-unknown-linux-musl'] }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Resolve the previous SemVer-shaped tag (if any) for the
          # changelog range. If no previous tag exists, fall back to the
          # root commit so first releases still produce a sensible log.
          # Keep this glob in lockstep with the trigger glob up top so
          # only SemVer-shaped tags count as candidate "previous" tags
          # for the changelog range. Tags are bare SemVer (no `v`
          # prefix).
          prev_tag="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -v -x "${TAG}" | head -n1 || true)"
          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..${TAG}"
            range_label="${prev_tag}...${TAG}"
          else
            range="${TAG}"
            range_label="initial release"
          fi

          {
            echo "# aimx ${TAG}"
            echo
            echo "_Released ${DATE}._"
            echo
            echo "## Changelog (${range_label})"
            echo
            if [ -n "${prev_tag}" ]; then
              git log --no-merges --pretty=format:'- %s (%h)' "${range}" || true
            else
              git log --no-merges --pretty=format:'- %s (%h)' "${TAG}" || true
            fi
            echo
            echo
            echo "## SHA-256 checksums"
            echo
            echo "Tarball names drop the \`-unknown-\` vendor field;"
            echo "the canonical Rust target triple is shown for reference."
            echo
            echo "| Tarball | Target triple | SHA-256 |"
            echo "| --- | --- | --- |"
            echo "| \`aimx-${VERSION}-x86_64-linux-gnu.tar.gz\`   | \`x86_64-unknown-linux-gnu\`   | \`${SHA_X86_GNU:-unavailable}\` |"
            echo "| \`aimx-${VERSION}-aarch64-linux-gnu.tar.gz\`  | \`aarch64-unknown-linux-gnu\`  | \`${SHA_ARM_GNU:-unavailable}\` |"
            echo "| \`aimx-${VERSION}-x86_64-linux-musl.tar.gz\`  | \`x86_64-unknown-linux-musl\`  | \`${SHA_X86_MUSL:-unavailable}\` |"
            echo "| \`aimx-${VERSION}-aarch64-linux-musl.tar.gz\` | \`aarch64-unknown-linux-musl\` | \`${SHA_ARM_MUSL:-unavailable}\` |"
            echo
            echo "The release-wide \`SHA256SUMS\` file is attached as an asset."
            echo
            echo "## Verify a download"
            echo
            echo "Pick the tarball for your target, then:"
            echo
            echo '```sh'
            echo "# x86_64 glibc"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-x86_64-linux-gnu.tar.gz"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-x86_64-linux-gnu.tar.gz.sha256"
            echo "sha256sum -c aimx-${VERSION}-x86_64-linux-gnu.tar.gz.sha256"
            echo
            echo "# aarch64 glibc"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-aarch64-linux-gnu.tar.gz"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-aarch64-linux-gnu.tar.gz.sha256"
            echo "sha256sum -c aimx-${VERSION}-aarch64-linux-gnu.tar.gz.sha256"
            echo
            echo "# x86_64 musl"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-x86_64-linux-musl.tar.gz"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-x86_64-linux-musl.tar.gz.sha256"
            echo "sha256sum -c aimx-${VERSION}-x86_64-linux-musl.tar.gz.sha256"
            echo
            echo "# aarch64 musl"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-aarch64-linux-musl.tar.gz"
            echo "curl -fsSLO ${base_url}/aimx-${VERSION}-aarch64-linux-musl.tar.gz.sha256"
            echo "sha256sum -c aimx-${VERSION}-aarch64-linux-musl.tar.gz.sha256"
            echo '```'
            echo
            echo "Or verify every tarball at once with the aggregate file:"
            echo
            echo '```sh'
            echo "curl -fsSLO ${base_url}/SHA256SUMS"
            echo "sha256sum -c --ignore-missing SHA256SUMS"
            echo '```'
            echo
            echo "Trust anchor for v1 is HTTPS on the GitHub Releases domain."
            echo "Signed releases (minisign / cosign / GPG) are deferred to v2."
          } > "${notes_file}"
          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Detect pre-release
        id: prerelease
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Treat any tag that carries a hyphen after the SemVer core as
          # a pre-release (e.g. 0.0.0-rc1, 0.0.0-fixture, 1.2.3-rc1). Tags
          # are bare, but a leading `v` is tolerated for legacy
          # compatibility.
          if printf '%s' "${TAG}" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: aimx ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            dist/aimx-*.tar.gz
            dist/aimx-*.tar.gz.sha256
            dist/SHA256SUMS
