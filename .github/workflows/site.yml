name: Site

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'book/**'
      - 'install.sh'
      - 'portcheck.sh'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'website/**'
      - 'book/**'
      - 'install.sh'
      - 'portcheck.sh'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-mermaid
        run: |
          MERMAID_VERSION=0.17.0
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        working-directory: website
        run: make build

      - name: Verify output
        run: |
          test -f website/dist/index.html
          test -f website/dist/book/index.html
          test -f website/dist/book/faq.html
          test -f website/dist/book/security.html
          test -f website/dist/assets/aimx-pigeon.svg
          test -f website/dist/assets/aimx-claude-demo-op.gif
          test -f website/dist/install.sh
          test -f website/dist/portcheck.sh
          # Verify install.sh and portcheck.sh are syntactically valid
          # POSIX sh before publishing to aimx.email — site build is
          # the last gate.
          sh -n website/dist/install.sh
          sh -n website/dist/portcheck.sh
          head -1 website/dist/install.sh | grep -q '^#!/bin/sh'
          head -1 website/dist/portcheck.sh | grep -q '^#!/bin/sh'

      - name: Add CNAME for custom domain
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo 'aimx.email' > website/dist/CNAME

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
