[package]
name = "aimx"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
toml = "1"
mail-parser = "0.11"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
html2text = "0.16"
rsa = { version = "0.9", features = ["pem"] }
base64 = "0.22"
mail-auth = "0.7"
mime_guess = "2"
rmcp = { version = "1.3.0", features = ["server", "transport-io"] }
tokio = { version = "1.51.1", features = ["rt-multi-thread", "macros", "io-util", "io-std", "net", "time", "sync", "signal"] }
tokio-rustls = "0.26"
rustls = { version = "0.23", default-features = false, features = ["aws-lc-rs", "std"] }
rustls-pemfile = "2"
serde_json = "1.0.149"
schemars = "1.2.1"
glob-match = "0.2"
libc = "0.2"
colored = "3"
rustls-pki-types = { version = "1", features = ["alloc"] }
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1", "tokio1-rustls-tls"] }
hickory-resolver = "0.25"
include_dir = "0.7"
sha2 = "0.10"
psl = "2"
unicode-normalization = "0.1"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
wait-timeout = "0.2"
rcgen = "0.13"
sha2 = "0.10"
