[book]
title = "AIMX"
description = "Self-hosted email for AI agents"
authors = ["U-Zyn Chua"]
language = "en"
src = "book"

[build]
build-dir = "book-output"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/uzyn/aimx"
edit-url-template = "https://github.com/uzyn/aimx/edit/main/book/{path}"
